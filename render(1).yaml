services:
- type: web
  name: stephphotos-1
  runtime: docker
  repo: https://github.com/derimer/stephphotos
  plan: starter
  envVars:
  - key: PROJECT_NAME_SPECIFIC_NAME
    sync: false
  - key: CLIENT_URL
    sync: false
  - key: DB_NAME
    sync: false
  - key: DB_PASSWORD
    sync: false
  - key: DB_USER
    sync: false
  - key: DB_PORT
    sync: false
  - key: DB_HOST
    sync: false
  - key: APP_SECRET
    sync: false
  - key: APP_PORT
    sync: false
  - key: VITE_API_URL
    sync: false
  region: frankfurt
  dockerContext: .
  dockerfilePath: ./Dockerfile
version: "1"
