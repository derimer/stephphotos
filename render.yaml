services:
  - type: web
    name: stephphotos-server
    env: node
    plan: free
    branch: master
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_PORT
        value: 3310
      - key: APP_SECRET
        value: YOUR_APP_SECRET_KEY
      - key: DB_HOST
        value: localhost
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: camille
      - key: DB_NAME
        value: photostpeh
      - key: CLIENT_URL
        value: http://localhost:3000
      - key: PROJECT_NAME_SPECIFIC_NAME
        value: YOUR_SPECIFIC_VALUE

  - type: web
    name: stephphotos-client
    env: static
    plan: free
    branch: master
    buildCommand: npm install && npm run build
    publishDir: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://stephphotos-server.onrender.com