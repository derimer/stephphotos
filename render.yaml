services:
  - type: web
    name: stephphotos-server
    env: node
    plan: free
    branch: master
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_PORT
        value: 3310
      - key: APP_SECRET
        value: my_secret_key
      - key: DB_HOST
        value: my-database.onrender.com
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: camille
      - key: DB_NAME
        value: photosteph
      - key: CLIENT_URL
        value: https://stephphotos-client.onrender.com
      - key: PROJECT_NAME_SPECIFIC_NAME
        value: my_specific_value

  - type: web
    name: stephphotos-client
    env: static
    plan: free
    branch: master
    buildCommand: npm install && npm run build
    publishDir: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://stephphotos-server.onrender.com